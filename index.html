<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanshi, A Question For You 💖</title>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;font-family:Poppins, sans-serif;background:linear-gradient(135deg,#ff9a9e,#fecfef);overflow:hidden}
.card{background:white;padding:40px 50px;border-radius:25px;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.2);position:relative;max-width:420px}
h1{margin-top:0;color:#ff4d6d;font-size:30px}
p{font-size:18px}
.buttons{margin-top:20px}
button{border:none;padding:12px 28px;margin:10px;font-size:18px;border-radius:40px;cursor:pointer;transition:.25s}
#yes{background:#ff4d6d;color:white}
#yes:hover{transform:scale(1.1)}
#no{background:#eee;position:relative}
#message{display:none;font-size:24px;margin-top:20px;color:#ff4d6d}
.small{font-size:14px;color:#666;margin-top:10px}
.heart{position:fixed;font-size:20px;animation:floatUp 4s linear forwards}
@keyframes floatUp{from{transform:translateY(0);opacity:1}to{transform:translateY(-600px);opacity:0}}
</style>
</head>
<body>
<div class="card">
<h1>Hey Vanshi 💕</h1>
<p>Varun has something to ask you...</p>
<p><b>Will you go on a date with me? 🌸</b></p>
<div class="buttons">
<button id="yes">Yes 😍</button>
<button id="no">No 🙈</button>
</div>
<div id="message">YAY Vanshi!! 🥰<br>Varun is really happy right now 💌</div>
<div class="small">(You can't really press No 😜)</div>
</div>
<script>
const yesBtn=document.getElementById('yes');
const noBtn=document.getElementById('no');
const msg=document.getElementById('message');
noBtn.addEventListener('mouseover',()=>{const x=Math.random()*300-150;const y=Math.random()*300-150;noBtn.style.transform=translate(${x}px,${y}px)});
yesBtn.addEventListener('click',()=>{msg.style.display='block';for(let i=0;i<30;i++){const heart=document.createElement('div');heart.className='heart';heart.innerHTML='💖';heart.style.left=Math.random()*100+'vw';heart.style.top='70vh';document.body.appendChild(heart);setTimeout(()=>heart.remove(),4000)}});
</script>
</body>
</html>
